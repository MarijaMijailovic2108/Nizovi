<body>

<h1>Nizovi u JavaScriptu</h1>

<div id="imena">Ana, Nikola, Milica, Milos, Teodora, Goran</div>

<h3>Unesi novo ime:</h3>
<input type="text" id="imeInput" placeholder="Unesi novo ime">

<div class="dugmad">
    <button onclick="dodaj()">Dodaj</button>
    <button onclick="obrisi()">Obrisi</button>
    <button onclick="razmesti()">Razmesti</button>
    <button onclick="sortiraj()">Sortiraj</button>
</div>

<script>

let imena = ['Ana', 'Teodora', 'Marko', 'Tamara'];

const prikaz = document.getElementById('rezultati');

prikaz.innerHTML = imena.join(' ! ');

const input = document.getElementById('unesi');
const dodajNovoImeDugme = document.getElementById('dodaj');

dodajNovoImeDugme.addEventListener('click', function() {
    let unosKorisnika = input.value;
    imena.push(unosKorisnika);
    console.log(imena);
    prikaz.innerHTML = imena.join(' ! ');
});




</script>


    <script src="app.js"></script>
